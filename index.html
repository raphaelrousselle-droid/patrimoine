/* Calcul amortissement */
function calcAmort(emprunte,tauxAnnuel,dureeMois){
  if(!emprunte||!dureeMois||dureeMois<=0)return{mensualite:0,restant:emprunte||0,tableau:[]};
  const r=tauxAnnuel/100/12;
  let mens;
  if(r===0){mens=emprunte/dureeMois}
  else{mens=emprunte*r*Math.pow(1+r,dureeMois)/(Math.pow(1+r,dureeMois)-1)}
  let rest=emprunte;const tab=[];
  for(let i=1;i<=dureeMois&&rest>0;i++){
    const interet=rest*r;
    const capital=Math.min(mens-interet,rest);
    rest=Math.max(0,rest-capital);
    tab.push({mois:i,mens:Math.round(mens*100)/100,interet:Math.round(interet*100)/100,capital:Math.round(capital*100)/100,restant:Math.round(rest*100)/100});
  }
  return{mensualite:Math.round(mens*100)/100,restant:Math.round(rest*100)/100,tableau:tab};
}

  document.getElementById('bk').innerHTML=`<div class="kpi"><div class="kl">Total Bourse</div><div class="kv" style="color:var(--bourse)">${F(tB)}</div></div><div class="kpi"><div class="kl">Total Versé</div><div class="kv">${F(tV)}</div></div><div class="kpi"><div class="kl">Perf réelle</div><div class="kv" style="color:${tPVer>=0?'var(--green)':'var(--red)'}">${F2(tPVer)}</div><div class="ks">${FP(tV>0?(tPVer/tV)*100:0)}</div></div><div class="kpi"><div class="kl">Dividendes / an</div><div class="kv" style="color:var(--orange)">${F2(allDiv)}</div></div>`;
  document.getElementById('bw').innerHTML=`<div style="width:${(t.p.v/tB*100)}%;background:#7c3aed"></div><div style="width:${(t.s.v/tB*100)}%;background:#a78bfa"></div><div style="width:${(t.i.v/tB*100)}%;background:#c4b5fd"></div>`;
  let ph='<table class="pt"><thead><tr><th></th><th>S&P 500</th><th>Mon portf.</th><th>+/- values</th></tr></thead><tbody>';S.perfMois.forEach(r=>{ph+=`<tr><td class="rl">${r.label}</td>${PC(r.sp500)}${PC(r.portf)}<td style="font-weight:600;color:${(r.pv||0)>=0?'var(--green)':'var(--red)'}">${r.pv!=null?F2(r.pv):'—'}</td></tr>`});const ts2=S.perfMois.reduce((a,r)=>a+(r.sp500||0),0),tp2=S.perfMois.reduce((a,r)=>a+r.portf,0),tv2=S.perfMois.reduce((a,r)=>a+(r.pv||0),0);ph+=`<tr class="total-row"><td class="rl">Année 2026</td>${PC(ts2)}${PC(tp2)}<td style="font-weight:800;color:${tv2>=0?'var(--green)':'var(--red)'}">${F2(tv2)}</td></tr></tbody></table>`;document.getElementById('ptw').innerHTML=ph;document.getElementById('sps').textContent=spSt;
  const rsCls=rStat.startsWith('✓')?'rs ok':rStat.startsWith('⚠')?'rs err':'rs load';document.getElementById('rstat').innerHTML=rStat?`<span class="${rsCls}">${rStat}</span>`:'';document.getElementById('rstatc').innerHTML=rStat?`<span class="${rsCls}">${rStat}</span>`:'';

  /* Portfolio KPIs — versements et espèces éditables */
  const mk2=(c,pf,pk)=>`<div class="kpi sm"><div class="kl">Valeur</div><div class="kv" style="color:var(--bourse)">${F2(c.v)}</div></div><div class="kpi sm"><div class="kl">Versé</div><div class="kv"><span class="ed" onclick="edVer(this,'${pk}')">${F(pf.ver)}</span></div></div><div class="kpi sm"><div class="kl">Perf réelle</div><div class="kv" style="color:${c.pvVer>=0?'var(--green)':'var(--red)'}">${F2(c.pvVer)}</div><div class="ks">${FP(c.ppVer)}</div></div><div class="kpi sm"><div class="kl">Espèces</div><div class="kv"><span class="ed" onclick="edEsp(this,'${pk}')">${F(pf.esp)}</span></div></div><div class="kpi sm"><div class="kl">Div/an</div><div class="kv" style="color:var(--orange)">${F2(c.divTot)}</div></div>`;
  document.getElementById('pk1').innerHTML=mk2(t.p,S.pf.pea,'pea');document.getElementById('pk2').innerHTML=mk2(t.s,S.pf.ctosb,'ctosb');document.getElementById('pk3').innerHTML=mk2(t.i,S.pf.ctoibkr,'ctoibkr');
  rPT('pt1',t.p,'pea');rPT('pt2',t.s,'ctosb');rPT('pt3',t.i,'ctoibkr');

  /* EPARGNE */
  document.getElementById('ek').innerHTML=`<div class="kpi"><div class="kl">Épargne totale</div><div class="kv" style="color:var(--epargne)">${F(t.ep)}</div></div><div class="kpi"><div class="kl">Libre</div><div class="kv">${F(t.eL)}</div></div><div class="kpi"><div class="kl">Bloquée</div><div class="kv">${F(t.eB)}</div></div>`;
  document.getElementById('ct1').textContent="Comptes courants — "+F(t.co);document.getElementById('cl1').innerHTML=mkL(S.comptes,'comptes',[{k:'montant',fmt:F}]);document.getElementById('af1').innerHTML=addB('af1',[{k:'nom',label:'Nom',w:2},{k:'banque',label:'Banque'},{k:'montant',label:'Montant',num:true}],'comptes',{banque:'',montant:0});
  document.getElementById('ct2').textContent="Épargne libre — "+F(t.eL);document.getElementById('cl2').innerHTML=mkL(S.epLibre,'epLibre',[{k:'montant',fmt:F}]);document.getElementById('af2').innerHTML=addB('af2',[{k:'nom',label:'Nom',w:2},{k:'banque',label:'Banque'},{k:'montant',label:'Montant',num:true}],'epLibre',{banque:'',montant:0});
  document.getElementById('ct3').textContent="Épargne bloquée — "+F(t.eB);document.getElementById('cl3').innerHTML=mkL(S.epBloq,'epBloq',[{k:'montant',fmt:F}]);document.getElementById('af3').innerHTML=addB('af3',[{k:'nom',label:'Nom',w:2},{k:'banque',label:'Banque'},{k:'montant',label:'Montant',num:true}],'epBloq',{banque:'',montant:0});

  /* IMMO */
  const imT=S.immo.reduce((a,x)=>a+x.valeur*(x.partsPct/100),0);document.getElementById('ik').innerHTML=`<div class="kpi"><div class="kl">Total Immo</div><div class="kv" style="color:var(--immo)">${F(imT)}</div></div><div class="kpi"><div class="kl">Biens</div><div class="kv">${S.immo.length}</div></div><div class="kpi"><div class="kl">Dettes</div><div class="kv" style="color:var(--red)">${F(t.de)}</div></div><div class="kpi"><div class="kl">Net vendeur</div><div class="kv" style="color:${imT-t.de>=0?'var(--green)':'var(--red)'}">${F(imT-t.de)}</div></div>`;
  let imH='';S.immo.forEach(b=>{const mv=b.valeur*(b.partsPct/100);imH+=`<div class="card"><div style="display:flex;justify-content:space-between"><div><div style="font-weight:700;font-size:16px">${b.nom}</div><div style="font-size:12px;color:var(--muted)">${b.type}</div></div><button class="db" onclick="dI('immo','${b.id}')">✕</button></div><div class="lr"><span style="color:var(--muted)">Prix d'achat</span><span class="ed" onclick="eI(this,'immo','${b.id}','prixAchat')">${F(b.prixAchat)}</span></div><div class="lr"><span style="color:var(--muted)">Valeur estimée</span><span class="ed" onclick="eI(this,'immo','${b.id}','valeur')" style="font-weight:700;color:var(--immo)">${F(b.valeur)}</span></div>${b.sci?`<div class="sci-card"><div style="font-size:13px;font-weight:700;color:var(--immo);margin-bottom:8px">🏢 SCI</div><div class="lr"><span>Mes parts</span><span class="ed" onclick="eI(this,'immo','${b.id}','partsPct')">${b.partsPct}%</span></div><div class="lr"><span>Ma quote-part</span><span style="font-weight:700;color:var(--immo)">${F(mv)}</span></div></div>`:`<div style="margin-top:8px"><button style="font-size:11px;color:var(--muted);background:none;border:1px dashed var(--border);border-radius:6px;padding:4px 10px;cursor:pointer" onclick="var b=S.immo.find(x=>x.id==='${b.id}');if(b){b.sci=true;b.partsPct=50}autoSave();R(true)">🏢 Activer SCI</button></div>`}</div>`});imH+=`<div id="ia"></div>`;document.getElementById('ic').innerHTML=imH;document.getElementById('ia').innerHTML=addB('ia',[{k:'nom',label:'Nom',w:2},{k:'type',label:'Type'},{k:'prixAchat',label:"Prix",num:true},{k:'valeur',label:'Valeur',num:true}],'immo',{sci:false,partsPct:100});

  /* CRYPTO — avec récap performance globale */
  const tCr=t.cr,crInv=t.crInv,crPV=tCr-crInv,crPP=crInv>0?(crPV/crInv)*100:0;
  document.getElementById('ck').innerHTML=`<div class="kpi"><div class="kl">Total Crypto</div><div class="kv" style="color:var(--crypto)">${F2(tCr)}</div></div><div class="kpi"><div class="kl">Total Investi</div><div class="kv">${F2(crInv)}</div></div><div class="kpi"><div class="kl">+/- Value</div><div class="kv" style="color:${crPV>=0?'var(--green)':'var(--red)'}">${F2(crPV)}</div><div class="ks">${crInv>0?FP(crPP):'—'}</div></div><div class="kpi"><div class="kl">Tokens</div><div class="kv">${S.crypto.length}</div></div>`;
  let crH='<table><thead><tr><th class="l">Crypto</th><th>Qté</th><th>PRU</th><th>Prix</th><th>Valeur</th><th>+/- Value</th><th>+/- %</th><th>Var.</th><th></th></tr></thead><tbody>';
  [...S.crypto].sort((a,b)=>(b.montant||0)-(a.montant||0)).forEach(c=>{const mt=c.prix>0?c.prix*c.qte:(c.montant||0);const pt=c.pru*c.qte;const gp=mt-pt;const gpP=pt>0?(gp/pt)*100:0;crH+=`<tr><td class="l"><div style="font-weight:600">${c.nom}</div><div class="tk">${c.symbol}</div></td><td><span class="ed" onclick="eI(this,'crypto','${c.id}','qte')">${c.qte}</span></td><td><span class="ed" onclick="eI(this,'crypto','${c.id}','pru')">${c.pru?F2(c.pru):'—'}</span></td><td>${c.prix?F2(c.prix):'—'}</td><td style="font-weight:700">${F2(mt)}</td><td style="color:${gp>=0?'var(--green)':'var(--red)'};font-weight:600">${pt>0?(gp>=0?'+':'')+F2(gp):'—'}</td><td>${pt>0?BG(gpP):'—'}</td><td>${VC(c.var)}</td><td><button class="db" onclick="dI('crypto','${c.id}')">✕</button></td></tr>`});crH+='</tbody></table>';
  document.getElementById('crt').innerHTML=crH;
  document.getElementById('cra').innerHTML=addB('cra',[{k:'nom',label:'Nom',w:2},{k:'symbol',label:'Symbol'},{k:'qte',label:'Qté',num:true},{k:'pru',label:'PRU €',num:true}],'crypto',{prix:0,var:0,pru:0,montant:0});

  /* DETTES — avec amortissement auto */
  document.getElementById('dk').innerHTML=`<div class="kpi"><div class="kl">Total dettes</div><div class="kv" style="color:var(--red)">${F(t.de)}</div></div><div class="kpi"><div class="kl">Mensualités totales</div><div class="kv">${F(S.dettes.reduce((a,d)=>{const am=calcAmort(d.emprunte,d.taux||0,d.dureeMois||0);return a+am.mensualite},0))}</div><div class="ks">/ mois</div></div><div class="kpi"><div class="kl">Net vendeur</div><div class="kv" style="color:${t.im-t.de>=0?'var(--green)':'var(--red)'}">${F(t.im-t.de)}</div></div>`;
  let dH='';
  S.dettes.forEach(d=>{
    const am=calcAmort(d.emprunte,d.taux||0,d.dureeMois||0);
    const p=d.emprunte>0?((d.emprunte-d.restant)/d.emprunte*100).toFixed(1):'0';
    dH+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:start"><div><div style="font-weight:700;font-size:15px">${d.nom}</div><div style="font-size:12px;color:var(--muted)">${d.type||''} — ${d.banque||''}</div></div><button class="db" onclick="dI('dettes','${d.id}')">✕</button></div>`;
    dH+=`<div class="lr"><span style="color:var(--muted)">Emprunté</span><span style="font-weight:600">${F(d.emprunte)}</span></div>`;
    dH+=`<div class="lr"><span style="color:var(--muted)">Restant dû</span><span class="ed" onclick="eI(this,'dettes','${d.id}','restant')" style="font-weight:700;color:var(--red)">${F(d.restant)}</span></div>`;
    dH+=`<div class="lr"><span style="color:var(--muted)">Taux annuel</span><span class="ed" onclick="eI(this,'dettes','${d.id}','taux')">${(d.taux||0).toFixed(2)}%</span></div>`;
    dH+=`<div class="lr"><span style="color:var(--muted)">Durée</span><span class="ed" onclick="eI(this,'dettes','${d.id}','dureeMois')">${d.dureeMois||0} mois</span></div>`;
    dH+=`<div class="lr"><span style="color:var(--muted)">Mensualité</span><span style="font-weight:700">${F2(am.mensualite)}</span></div>`;
    dH+=`<div class="lr"><span style="color:var(--muted)">Fin</span><span>${d.fin||'—'}</span></div>`;
    dH+=`<div class="pg"><div class="pf" style="width:${p}%"></div></div><div style="font-size:10px;color:var(--muted);margin-top:3px">${p}% remboursé</div>`;
    /* Mini tableau amortissement (5 dernières + 5 prochaines échéances) */
    if(am.tableau.length>0){
      const moisEcoules=d.emprunte>0?Math.round((1-d.restant/d.emprunte)*am.tableau.length):0;
      const start=Math.max(0,moisEcoules-2);
      const slice=am.tableau.slice(start,start+8);
      dH+=`<details style="margin-top:8px"><summary style="font-size:11px;color:var(--muted);cursor:pointer">📋 Tableau d'amortissement</summary><div class="amor-table"><table><thead><tr><th>Mois</th><th>Mensualité</th><th>Capital</th><th>Intérêts</th><th>Restant</th></tr></thead><tbody>`;
      slice.forEach(r=>{
        const isCur=r.mois===moisEcoules||r.mois===moisEcoules+1;
        dH+=`<tr style="${isCur?'background:#f0fdf4;font-weight:600':''}"><td>${r.mois}</td><td>${F2(r.mens)}</td><td>${F2(r.capital)}</td><td>${F2(r.interet)}</td><td>${F2(r.restant)}</td></tr>`;
      });
      dH+=`</tbody></table><div style="font-size:10px;color:var(--muted);padding:4px 8px">${am.tableau.length} échéances au total</div></div></details>`;
    }
    dH+=`</div>`;
  });
  dH+=`<div id="da"></div>`;
  document.getElementById('dl2').innerHTML=dH;
  document.getElementById('da').innerHTML=addB('da',[{k:'nom',label:'Nom',w:2},{k:'type',label:'Type'},{k:'banque',label:'Banque'},{k:'emprunte',label:'Emprunté',num:true},{k:'taux',label:'Taux %',num:true},{k:'dureeMois',label:'Durée (mois)',num:true},{k:'fin',label:'Date fin'}],'dettes',{restant:0});
}

/* Portfolio table avec dividende par action */
function rPT(cid,calc,pk){const isUSD=calc.isUSD;let h=`<table><thead><tr><th class="l">Titre</th><th>Qté</th><th>PRU${isUSD?' ($)':''}</th><th>Cours</th><th>Var.</th><th>Valeur €</th><th>+/-</th><th>+/- %</th><th>Div/act</th><th>Poids</th><th></th></tr></thead><tbody>`;calc.l.forEach(l=>{h+=`<tr><td class="l"><div style="font-weight:600;font-size:12px">${l.n}</div><div class="tk">${l.c}</div></td><td><span class="ed" onclick="ePf(this,'${pk}',${l.id},'p')">${l.p}</span></td><td><span class="ed" onclick="ePf(this,'${pk}',${l.id},'pr')">${isUSD?'$'+l.pr.toFixed(2):F2(l.pr)}</span></td><td>${F2(l.co)}${isUSD&&l.usd?'<div class="tk">$'+l.usd.toFixed(2)+'</div>':''}</td><td>${VC(l.var)}</td><td style="font-weight:700;font-size:12px">${F2(l.vaEur)}</td><td style="color:${l.g>=0?'var(--green)':'var(--red)'};font-weight:600;font-size:12px">${l.g>=0?'+':''}${isUSD?'$'+l.g.toFixed(2):F2(l.g)}</td><td>${BG(l.gp)}</td><td><span class="ed" onclick="ePf(this,'${pk}',${l.id},'div')" style="color:var(--orange)">${(l.div||0).toFixed(2)}€</span></td><td style="color:var(--muted);font-size:11px">${l.w.toFixed(1)}%</td><td><button class="db" onclick="dPf('${pk}',${l.id})">✕</button></td></tr>`});h+=`</tbody></table><div id="add-${pk}"><button class="ab" onclick="sA('${pk}')">+ Ajouter</button></div>`;document.getElementById(cid).innerHTML=h}
window.ePf=(el,pk,id,f)=>{const c=el.textContent.replace(/[^\d.,-]/g,'').replace(',','.');el.outerHTML=`<input class="ci" value="${c}" onkeydown="if(event.key==='Enter')cPf2(this,'${pk}',${id},'${f}');if(event.key==='Escape')R()" onblur="cPf2(this,'${pk}',${id},'${f}')" autofocus>`};
window.cPf2=(i,pk,id,f)=>{const v=parseFloat(i.value.replace(',','.'));const l=S.pf[pk].l.find(x=>x.id===id);if(l&&!isNaN(v))l[f]=v;autoSave();R()};
window.dPf=(pk,id)=>{S.pf[pk].l=S.pf[pk].l.filter(l=>l.id!==id);autoSave();R()};
window.sA=pk=>{document.getElementById(`add-${pk}`).innerHTML=`<div class="ar"><input class="ai" placeholder="Ticker" id="ac-${pk}"><input class="ai" style="flex:2" placeholder="Nom *" id="an-${pk}"><input class="ai" placeholder="Cours" id="ao-${pk}"><input class="ai" placeholder="Qté" id="ap-${pk}"><input class="ai" placeholder="PRU" id="ar-${pk}"><input class="ai" placeholder="Div/act" id="ad-${pk}"><button class="ac" onclick="cA('${pk}')">✓</button><button class="ax" onclick="R()">✕</button></div>`};
window.cA=pk=>{const n=document.getElementById(`an-${pk}`).value.trim();if(!n)return;S.pf[pk].l.push({id:nid(),c:document.getElementById(`ac-${pk}`).value.trim()||'—',n,co:parseFloat(document.getElementById(`ao-${pk}`).value.replace(',','.'))||0,p:parseFloat(document.getElementById(`ap-${pk}`).value.replace(',','.'))||0,pr:parseFloat(document.getElementById(`ar-${pk}`).value.replace(',','.'))||0,div:parseFloat(document.getElementById(`ad-${pk}`).value.replace(',','.'))||0,var:0});autoSave();R()};

R(true);fSP();setTimeout(()=>doRef(),2000);
</script>
</body>
</html>
